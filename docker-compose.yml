services:
  mysql:
    image: mysql:8.0
    container_name: fetch_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: fetch
      MYSQL_USER: fetch
      MYSQL_PASSWORD: fetchpass
    ports:
      - "3307:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fetch_bilibili
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./data/bilibili:/data/bilibili
      - ./configs/config.example.yaml:/app/config.yaml:ro
      # 可选：挂载博主列表文件（与 config 中的 creators.file 对应）
      # - ./configs/creators.example.yaml:/app/creators.yaml:ro
      # 可选：挂载 Cookie 文件（与 config 中的 bilibili.cookie_file 对应）
      # - ./secrets/bilibili_cookie.txt:/app/secrets/bilibili_cookie.txt:ro
    environment:
      # 可用 FETCH_CONFIG 指定配置文件路径
      FETCH_CONFIG: /app/config.yaml
